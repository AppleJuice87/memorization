<div class="memo-floating-panel">
  <button class="memo-btn" onclick="setMode('VIEW')">정답 보기</button>
  <button class="memo-btn" onclick="setMode('MASK')">마스킹 모드</button>
  <button class="memo-btn" onclick="setMode('BLANK')">빈칸 채우기</button>
  <button class="memo-btn" onclick="setMode('HINT')">첫글자 힌트</button>
  <button class="memo-btn" onclick="toggleEditMode('ON')">커스텀 편집</button>
</div>

<div id="memoBottomPanel" class="memo-bottom-panel">
  <span id="panelGuideText">[드래그]: 빈칸 생성 &nbsp;&nbsp; [우클릭]: 빈칸 제거 &nbsp;&nbsp; [Ctrl/CMD]+[Z]: 되돌리기</span>
  <button onclick="copyToClipboard()">저장 (클립보드 복사)</button>
  <button onclick="toggleEditMode('OFF')">닫기 (ESC)</button>
</div>

<script>
  let currentMode = 'VIEW';
  let isEditMode = false;
  let historyStack = [];

  const contentArea = document.querySelector('.tt_article_useless_p_margin') || document.querySelector('.prose') || document.body;

  function setMode(mode) {
    if (isEditMode) return alert('편집 모드를 먼저 종료해주세요.');
    currentMode = mode;
    
    contentArea.className = contentArea.className.replace(/memo-mode-\w+/g, '');
    if (mode === 'VIEW') contentArea.classList.add('memo-mode-answer');
    if (mode === 'MASK') contentArea.classList.add('memo-mode-mask');

    document.querySelectorAll('.memo-mask').forEach(span => {
      span.classList.remove('is-correct', 'is-incorrect');
      if (span.querySelector('input')) {
        span.innerHTML = span.dataset.answer;
      }
    });

    if (mode === 'BLANK' || mode === 'HINT') {
      document.querySelectorAll('.memo-mask').forEach(span => {
        const answer = span.innerText;
        span.dataset.answer = answer; 
        
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'memo-input';
        
        // [추가] 텍스트 길이에 비례한 동적 너비 할당 (ch 단위 활용, 여백 고려)
        input.style.width = `calc(${Math.max(2, answer.length)}ch + 16px)`;

        if (mode === 'HINT') {
          input.placeholder = answer.charAt(0);
        }
        
        input.addEventListener('keydown', function(e) {
          if (e.isComposing || e.keyCode === 229) return;

          if (e.key === 'Enter') {
            e.preventDefault(); 

            if (this.value.trim() === answer) {
              span.innerHTML = answer;
              span.classList.add('is-correct');
            } else {
              span.innerHTML = answer;
              span.classList.add('is-incorrect');
            }

            setTimeout(() => {
              const nextInput = document.querySelector('.memo-input');
              if (nextInput) {
                nextInput.focus();
              }
            }, 10); 
          }
        });

        span.innerHTML = '';
        span.appendChild(input);
      });
    }
  }

  function toggleEditMode(state) {
    const bottomPanel = document.getElementById('memoBottomPanel');

    if (state === 'OFF') {
      isEditMode = false;
      bottomPanel.classList.remove('show');
      contentArea.removeEventListener('mouseup', handleSelection);
      contentArea.removeEventListener('contextmenu', handleRightClick);
      return;
    }

    setMode('VIEW'); 
    isEditMode = true;
    bottomPanel.classList.add('show');

    contentArea.addEventListener('mouseup', handleSelection);
    contentArea.addEventListener('contextmenu', handleRightClick);
  }

  function handleSelection() {
    if (!isEditMode) return;
    const selection = window.getSelection();
    if (!selection.isCollapsed && selection.toString().trim() !== '') {
      saveHistory(); 
      const range = selection.getRangeAt(0);
      const span = document.createElement('span');
      span.className = 'memo-mask';
      span.dataset.answer = selection.toString();
      
      try {
        range.surroundContents(span);
      } catch (e) {
        alert('여러 단락을 걸쳐서 마스킹할 수 없습니다. 한 문장 안에서 드래그해주세요.');
      }
      selection.removeAllRanges();
    }
  }

  function handleRightClick(e) {
    if (!isEditMode) return;
    const target = e.target.closest('.memo-mask');
    if (target) {
      e.preventDefault(); 
      saveHistory();
      const text = document.createTextNode(target.dataset.answer || target.innerText);
      target.parentNode.replaceChild(text, target);
    }
  }

  function saveHistory() {
    historyStack.push(contentArea.innerHTML);
    if (historyStack.length > 20) historyStack.shift(); 
  }

  window.addEventListener('keydown', function(e) {
    // [추가] ESC 키를 누르면 커스텀 편집 모드 닫기
    if (e.key === 'Escape' && isEditMode) {
      toggleEditMode('OFF');
    }

    // Ctrl+Z (Windows) 또는 Cmd+Z (Mac)
    if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
      if (isEditMode && historyStack.length > 0) {
        e.preventDefault();
        contentArea.innerHTML = historyStack.pop();
      }
    }
  });

  function copyToClipboard() {
    const htmlToCopy = contentArea.innerHTML;
    
    navigator.clipboard.writeText(htmlToCopy).then(() => {
      alert("마스킹이 적용된 HTML이 클립보드에 복사되었습니다!\n\n게시글 수정 -> '기본모드'를 'HTML'로 변경 후 전체 붙여넣기(Cmd/Ctrl + V) 해주세요.");
      toggleEditMode('OFF');
    }).catch(err => {
      alert("복사 실패. 브라우저 권한을 확인해주세요.");
    });
  }
</script>
